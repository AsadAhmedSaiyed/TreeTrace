name: TreeTrace CI/CD

on:
  push:
    branches: [ "main" ] # Runs whenever you push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Build and Push (Overwrites 'latest' tag)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/treetrace-backend:latest

      # 3. Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 4. Connect to AKS
      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: 'TreeTrace' # Replace with your RG
          cluster-name: 'TreeTraceCluster'     # Replace with your AKS Name

      # 5. The "Magic" Step: Force Pods to Restart
      - name: Rollout Restart
        run: |
          kubectl rollout restart deployment/treetrace-backend
