apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        # This script starts the server, waits a moment, then pulls the model
        command: ["/bin/sh", "-c"]
        args: 
          - |
            ollama serve & 
            sleep 10; 
            ollama pull llama3.2:3b; 
            wait
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
spec:
  type: LoadBalancer 
  selector:
    app: ollama
  ports:
  - port: 80
    targetPort: 11434