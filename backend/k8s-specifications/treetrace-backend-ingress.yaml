apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: treetrace-backend-ingress
  annotations:
    # This line tells cert-manager to jump into action!
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # This line forces anyone typing http to be redirected to https
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.treetrace.tech
    secretName: treetrace-api-tls # cert-manager will save the certificate here
  rules:
  - host: api.treetrace.tech
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: treetrace-backend-service
            port:
              number: 80